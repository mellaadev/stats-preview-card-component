<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Stats preview card component</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend+Deca&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <main class="content">
    <div class="text">
      <h1>Get <span class="accent">insights</span> that help your business grow.</h1>
      <p class="description">Discover the benefits of data analytics and make <span class="line">better decisions regarding revenue, customer</span> experience, and overall efficiency.</p>

      <div class="items">
        <div class="item">
          <p class="number">10k+</p>
          <p class="textitem">companies</p>
        </div>

        <div class="item">
          <p class="number">314</p>
          <p class="textitem">templates</p>
        </div>

        <div class="item">
          <p class="number">12M+</p>
          <p class="textitem">queries</p>
        </div>
      </div>
    </div>

    <div class="imagen">
      <img src="img/image-header-desktop.jpg" alt="Imagen Header" class="img-desktop">
      <img src="img/image-header-mobile.jpg" alt="Imagen Header" class="img-mobile">
      <div class="mask"></div>
    </div>
  </main>

  <footer>
    <div class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
      Coded by <a href="#">Fran Mella</a>.
    </div>
  </footer>
</body>
</html>
